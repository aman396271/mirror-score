version: '3.8'
services:
  backend:
    build: ./backend
    restart: always
    expose:
      - '8000'
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://mirrorscore.primemind.top/api
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
